# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts a blank line between shell prompts
add_newline = false

# This has regressed, so I stopped it for now
# A minimal left prompt
# format = """$character"""

# # move the rest of the prompt to the right
# right_format = """$all"""

# Enable VCS module
format = """
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$nats\
$directory\
$vcs\
$all"""

[vcs]
order = ["git"]
git_modules = "$git_branch$git_commit$git_state"

[git_branch]
disabled = true
symbol = "´Éİ "

[git_commit]
disabled = true
tag_symbol = " ´ÉÆ "

[git_metrics]
disabled = true

[git_state]
disabled = true

[git_status]
disabled = true

[fossil_branch]
symbol = "´Éİ "
disabled = true

[fossil_metrics]
disabled = true

[hg_branch]
symbol = "´Éİ "
disabled = true

[hg_state]
disabled = true

[pijul_channel]
symbol = "´Éİ "
disabled = true

[directory]
read_only = " ¾░î¥"
truncate_to_repo = true
truncation_length = 4
truncation_symbol = "ÔÇĞ/"

[shlvl]
symbol = "¾░╣ı "
disabled = false

[custom.roc]
detect_extensions = ["roc"]
format = "via [$symbol($output )]($style)"
style = "bold purple"
symbol = "¾▒ùå nightly "

